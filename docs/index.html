// ── Compute analytics from any trade array (live, paper, or backtest) ────────
function _computeAnalytics(trades, startBal) {
  const closed  = (trades || []).filter(t => !t.open);
  const scored  = closed.filter(t => t.r_multiple !== null && t.r_multiple !== undefined);
  const wins    = scored.filter(t => parseFloat(t.r_multiple) >= 0);
  const losses  = scored.filter(t => parseFloat(t.r_multiple) < 0);
  const totalR  = scored.reduce((s, t) => s + parseFloat(t.r_multiple), 0);
  const avgR    = scored.length ? totalR / scored.length : 0;
  const winRate = scored.length ? Math.round(wins.length / scored.length * 100) : 0;

  // daily_pnl — keyed by exit date
  const dailyMap = {};
  closed.forEach(t => {
    const day = (t.timestamp_exit || t.timestamp_entry || '').slice(0, 10);
    if (day) dailyMap[day] = +((( dailyMap[day] || 0) + parseFloat(t.pnl_net_usd || t.pnl_usd || 0)).toFixed(2));
  });
  const daily_pnl = Object.fromEntries(Object.entries(dailyMap).sort());

  // hourly_stats (H4 buckets)
  const hrlyMap = {};
  scored.forEach(t => {
    try {
      const h = Math.floor(parseInt((t.timestamp_entry || '').slice(11, 13) || '0') / 4) * 4;
      const key = `${String(h).padStart(2,'0')}:00`;
      if (!hrlyMap[key]) hrlyMap[key] = { wins: 0, losses: 0 };
      if (parseFloat(t.r_multiple) >= 0) hrlyMap[key].wins++; else hrlyMap[key].losses++;
    } catch {}
  });
  const hourly_stats = Object.entries(hrlyMap).sort().map(([k, v]) => ({ hour: k, label: k, ...v }));

  // dow_stats
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dowMap = {};
  DAYS.forEach(d => { dowMap[d] = { wins: 0, losses: 0, r: 0 }; });
  scored.forEach(t => {
    try {
      const d = new Date((t.timestamp_entry || '').slice(0, 10) + 'T12:00:00Z').getUTCDay();
      const day = DAYS[d === 0 ? 6 : d - 1];
      const rm  = parseFloat(t.r_multiple);
      if (rm >= 0) dowMap[day].wins++; else dowMap[day].losses++;
      dowMap[day].r += rm;
    } catch {}
  });
  const dow_stats = DAYS.map(d => ({ day: d, wins: dowMap[d].wins, losses: dowMap[d].losses, total_r: +(dowMap[d].r.toFixed(2)) }));

  // ev_by_setup
  const smMap = {};
  scored.forEach(t => {
    const s = t.setup_type || '—';
    if (!smMap[s]) smMap[s] = { wins: 0, losses: 0, wr_r: 0, lr_r: 0 };
    const rm = parseFloat(t.r_multiple);
    if (rm >= 0) { smMap[s].wins++; smMap[s].wr_r += rm; }
    else { smMap[s].losses++; smMap[s].lr_r += Math.abs(rm); }
  });
  const ev_by_setup = Object.entries(smMap).map(([s, v]) => {
    const tot = v.wins + v.losses;
    const wr  = tot ? v.wins / tot : 0;
    const aw  = v.wins   ? +(v.wr_r / v.wins).toFixed(2)   : 0;
    const al  = v.losses ? +(v.lr_r / v.losses).toFixed(2) : 0;
    const ev  = +((wr * aw - (1 - wr) * al).toFixed(2));
    return { type: s, total: tot, wr: +(wr.toFixed(3)), avgW: aw, avgL: al, ev };
  }).sort((a, b) => b.ev - a.ev);

  // session_dd (monthly buckets)
  let runBal = startBal, peak = startBal, maxDD = 0;
  const monthEq = {};
  [...closed].sort((a, b) => (a.timestamp_exit||'').localeCompare(b.timestamp_exit||'')).forEach(t => {
    runBal += parseFloat(t.pnl_net_usd || t.pnl_usd || 0);
    if (runBal > peak) peak = runBal;
    const dd = peak > 0 ? (runBal - peak) / peak * 100 : 0;
    if (dd < maxDD) maxDD = dd;
    const m = (t.timestamp_exit || t.timestamp_entry || '').slice(0, 7);
    if (m) {
      if (!monthEq[m]) monthEq[m] = { start: runBal, end: runBal };
      monthEq[m].end = runBal;
    }
  });
  const session_dd = Object.entries(monthEq).slice(-20).map(([m, v]) => ({
    date: m, start: v.start, end: v.end,
    dd: v.start ? +((Math.min(v.end, v.start) - v.start) / v.start * 100).toFixed(2) : 0,
  }));

  const closedPnl = closed.reduce((s, t) => s + parseFloat(t.pnl_net_usd || t.pnl_usd || 0), 0);
  const finalEq   = startBal + closedPnl;
  const setupStats = {};
  scored.forEach(t => {
    const s = t.setup_type || '—';
    if (!setupStats[s]) setupStats[s] = { w: 0, l: 0 };
    if (parseFloat(t.r_multiple) >= 0) setupStats[s].w++; else setupStats[s].l++;
  });

  return {
    daily_pnl, hourly_stats, dow_stats, ev_by_setup, session_dd,
    stats: {
      total_r:       +totalR.toFixed(2),   avg_r:         +avgR.toFixed(3),
      win_rate:      winRate,               wins:          wins.length,
      losses:        losses.length,         max_dd_pct:    +maxDD.toFixed(2),
      max_drawdown:  +Math.abs(maxDD).toFixed(2),
      return_pct:    startBal ? +((finalEq - startBal) / startBal * 100).toFixed(2) : 0,
      total_net_pnl: +closedPnl.toFixed(2), closed_trades: scored.length,
      grades: {}, setupStats,
    },
  };
}

// ── Per-page error boundary — prevents one crashed page from blackening all ──
class PageBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null, info: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  componentDidCatch(e, info) { this.setState({ err: e, info }); }
  render() {
    if (this.state.err) {
      return (
        <div style={{ padding:40, fontFamily:"'Space Grotesk',sans-serif" }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#ff4d6d', marginBottom:8 }}>
            ⚠ Page error — {this.state.err?.message || 'unknown'}
          </div>
          <div style={{ fontSize:11, color:'#3e3e52', fontFamily:"'JetBrains Mono',monospace",
                        background:'#0d0d11', padding:12, borderRadius:6, marginBottom:12,
                        whiteSpace:'pre-wrap', maxHeight:200, overflow:'auto' }}>
            {this.state.info?.componentStack?.slice(0,500)}
          </div>
          <button onClick={() => this.setState({ err:null, info:null })}
            style={{ padding:'8px 18px', borderRadius:6, border:'1px solid #1f1f28',
                     background:'#111116', color:'#ece9e2', cursor:'pointer',
                     fontFamily:"'Space Grotesk',sans-serif", fontSize:12 }}>
            Retry
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [page, setPage]         = React.useState('overview');
  const [botStatus, setBotStatus] = React.useState('running');
  const [tweaks, setTweaks]     = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [data, setData]         = React.useState(MOCK);
  const [viewMode, setViewMode] = React.useState(() => localStorage.getItem('alphabot_mode') || 'live');
  const [simData, setSimData]   = React.useState(null);
  const [journalFilter, setJournalFilter] = React.useState(null);
  const [activeAsset, setActiveAsset] = React.useState(() => localStorage.getItem('alphabot_asset') || 'BTC');

  React.useEffect(() => { localStorage.setItem('alphabot_asset', activeAsset); }, [activeAsset]);

  // Persist mode to localStorage; clear strategy filter when switching to backtest
  React.useEffect(() => {
    localStorage.setItem('alphabot_mode', viewMode);
    if (viewMode === 'backtest') setJournalFilter(null);
  }, [viewMode]);

  // ── Live data refresh (state + trades + Coinbase balance) ─────────────────
  React.useEffect(() => {
    let stop = false;
    const refresh = async () => {
      try {
        const [stRes, trRes, cbRes, cfgRes] = await Promise.all([
          fetch('/api/state').then(r => r.ok ? r.json() : null).catch(() => null),
          fetch('/api/trades').then(r => r.ok ? r.json() : null).catch(() => null),
          fetch('/api/coinbase').then(r => r.ok ? r.json() : null).catch(() => null),
          fetch('/api/config').then(r => r.ok ? r.json() : null).catch(() => null),
        ]);
        if (stop) return;
        const merged = { ...MOCK };

        if (stRes && !stRes.err) {
          merged.bot_state = {
            ...MOCK.bot_state, ...stRes,
            active_trade: stRes.active_trade || MOCK.bot_state.active_trade,
          };
          if (stRes.active_trade) {
            const at = stRes.active_trade;
            // Normalize field name aliases — bot uses entry/sl/tp/nano_qty, components expect entry_price/sl_price/tp_price/qty
            merged.bot_state.active_trade = {
              ...at,
              entry_price: at.entry_price || at.entry || 0,
              sl_price:    at.sl_price    || at.sl    || 0,
              tp_price:    at.tp_price    || at.tp    || 0,
              qty:         at.qty         || at.nano_qty || at.qty_btc || 0,
            };
            merged.position = {
              symbol: 'BTC/USD', qty: at.qty_btc || 0,
              avg_entry_price: at.entry || 0,
              current_price: at.current_price || at.entry || 0,
              unrealized_pl: at.unrealized_pl || 0, unrealized_plpc: 0,
              side: at.side || 'long',
            };
          }
        }

        if (trRes?.trades?.length) merged.trades = trRes.trades;

        // Override config with live values from config.py
        if (cfgRes && !cfgRes.err) {
          merged.config = {
            ...MOCK.config,
            TIER_RISK_PCT: cfgRes.TIER_RISK_PCT || MOCK.config.TIER_RISK_PCT,
            TIER_RR:       cfgRes.TIER_RR       || MOCK.config.TIER_RR,
            HARD_CAP_PCT:  cfgRes.HARD_CAP_PCT  ?? MOCK.config.HARD_CAP_PCT,
            DD_FILTER_PCT: cfgRes.DD_FILTER_PCT ?? MOCK.config.DD_FILTER_PCT,
            EMA_FAST:      cfgRes.EMA_FAST      ?? MOCK.config.EMA_FAST,
            EMA_SLOW:      cfgRes.EMA_SLOW      ?? MOCK.config.EMA_SLOW,
            ATR_LEN:       cfgRes.ATR_LEN       ?? MOCK.config.ATR_LEN,
            RSI_LEN:       cfgRes.RSI_LEN       ?? MOCK.config.RSI_LEN,
            ACCOUNT_SIZE:  cfgRes.ACCOUNT_SIZE  ?? MOCK.config.ACCOUNT_SIZE,
          };
        }

        // ── Wire real Coinbase cash/stablecoin balance into account ──────────
        // Deliberately excludes BTC/XRP/ETH — only USD/USDC/USDT counted
        if (cbRes?.configured && !cbRes.err && cbRes.total_usd > 0) {
          merged.account = {
            ...MOCK.account,
            equity:       cbRes.total_usd,   // cash + stablecoins only
            buying_power: cbRes.total_usd,
            cash:         cbRes.total_usd,
            btc:          cbRes.btc || 0,
            btc_price:    cbRes.btc_price || 0,
            account_size: MOCK.account.account_size,
          };
        }

        setData(merged);
      } catch (e) { /* stay on last good data */ }
    };
    refresh();
    const id = setInterval(refresh, 15000);
    return () => { stop = true; clearInterval(id); };
  }, []);

  // ── Load backtest data — merge with MOCK so no field is ever undefined ────
  React.useEffect(() => {
    fetch('/api/backtest').then(r => r.ok ? r.json() : null).then(d => {
      if (!d || d.err) return;
      setSimData({
        ...MOCK,           // all MOCK fields as safe fallback
        ...d,              // backtest overrides
        config:    { ...MOCK.config,    ...(d.config    || {}) },
        bot_state: { ...MOCK.bot_state, ...(d.bot_state || {}) },
        account:   { ...MOCK.account,   ...(d.account   || {}) },
        stats:     { ...MOCK.stats,     ...(d.stats     || {}) },
      });
    }).catch(() => {});
  }, []);

  // Active dataset — PAPER/LIVE filter by DRY- prefix; BACKTEST uses simData
  const liveData = React.useMemo(() => {
    const liveTrades = (data.trades || []).filter(t => !String(t.trade_id||'').startsWith('DRY-') && t.dry_run !== 'True' && t.dry_run !== true);
    const analytics  = _computeAnalytics(liveTrades, data.account.account_size || 1000);
    // Build equity curve from closed trades
    let runBal = data.account.account_size || 1000;
    const closedSorted = liveTrades.filter(t => !t.open).sort((a,b) => (a.timestamp_exit||'').localeCompare(b.timestamp_exit||''));
    const equityCurve = [{ v: runBal }, ...closedSorted.map(t => {
      runBal += parseFloat(t.pnl_net_usd || t.pnl_usd || 0);
      return { v: Math.round(runBal * 100) / 100 };
    })];
    return { ...data, ...analytics, trades: liveTrades, equity: equityCurve.length > 1 ? equityCurve : data.equity };
  }, [data]);

  const paperData = React.useMemo(() => {
    const PAPER_START = 1000;
    const paperTrades = (data.trades || []).filter(t => String(t.trade_id||'').startsWith('DRY-') || t.dry_run === 'True' || t.dry_run === true);
    const analytics   = _computeAnalytics(paperTrades, PAPER_START);
    const paperEquity = PAPER_START + analytics.stats.total_net_pnl;
    // Build equity curve for SparkLine
    let running = PAPER_START;
    const closedPaper = paperTrades.filter(t => !t.open).sort((a,b) => (a.timestamp_exit||'').localeCompare(b.timestamp_exit||''));
    const paperEquityCurve = [{ v: PAPER_START }, ...closedPaper.map(t => {
      running += parseFloat(t.pnl_net_usd || t.pnl_usd || 0);
      return { v: Math.round(running * 100) / 100 };
    })];
    return {
      ...data, ...analytics, trades: paperTrades, equity: paperEquityCurve,
      account: { ...data.account, equity: paperEquity, buying_power: paperEquity, cash: paperEquity, account_size: PAPER_START },
    };
  }, [data]);

  const activeData = viewMode === 'backtest' ? (simData || data)
                   : viewMode === 'paper'    ? paperData
                   : liveData;
  const toggleProps = { viewMode, setViewMode, dateRange: simData?.date_range };

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  }, [tweaks.accentColor]);

  // Scroll active page to top whenever navigation changes
  React.useEffect(() => {
    const el = document.querySelector(`[data-page="${page}"]`);
    if (el) el.scrollTop = 0;
  }, [page]);

  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  // ── Page definitions ───────────────────────────────────────────────────────
  // All pages stay MOUNTED (display:none when inactive) so charts/state
  // survive navigation without teardown.
  const PAGE_DEFS = [
    { id:'overview',    el: <PageBoundary><Overview     data={activeData} {...toggleProps} simData={simData} onStrategyClick={(t)=>{ setJournalFilter(t); setPage('journal'); }} /></PageBoundary> },
    { id:'chart',       el: <PageBoundary><ChartPage    data={data} activePage={page} /></PageBoundary> },
    { id:'bot',         el: <PageBoundary><BotControl   data={data} botStatus={botStatus} setBotStatus={setBotStatus} /></PageBoundary> },
    { id:'journal',     el: <PageBoundary><Journal      data={activeData} {...toggleProps} strategyFilter={journalFilter} clearStrategyFilter={()=>setJournalFilter(null)} /></PageBoundary> },
    { id:'ledger',      el: <PageBoundary><Ledger       data={activeData} {...toggleProps} /></PageBoundary> },
    { id:'analytics',   el: <PageBoundary><Analytics    data={activeData} {...toggleProps} /></PageBoundary> },
    { id:'performance', el: <PageBoundary><Performance  data={activeData} {...toggleProps} simData={simData} /></PageBoundary> },
    { id:'risk',        el: <PageBoundary><RiskMonitor  data={activeData} {...toggleProps} /></PageBoundary> },
    { id:'signal',      el: <PageBoundary><SignalCheck  data={data} viewMode={viewMode} /></PageBoundary> },
    { id:'strategy',    el: <PageBoundary><Strategy     data={data} /></PageBoundary> },
    { id:'telegram',    el: <PageBoundary><TelegramPage data={data} /></PageBoundary> },
    { id:'brief',       el: <PageBoundary><MorningBrief /></PageBoundary> },
    { id:'coinbase',    el: <PageBoundary><CoinbaseAccount data={data} /></PageBoundary> },
  ];

  return (
    <div style={{ display:'flex', height:'100vh', width:'100%', background: tweaks.bgColor }}>
      <Sidebar active={page} setActive={setPage} botStatus={botStatus} viewMode={viewMode} setViewMode={setViewMode} data={activeData} />

      {/* All pages mounted; only active one visible */}
      <div style={{ flex:1, position:'relative', overflow:'hidden', display:'flex', flexDirection:'column' }}>

        {/* Asset switcher bar */}
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 16px',
                      borderBottom:'1px solid #1a1a22', background:'#0d0d11', flexShrink:0 }}>
          <AssetSwitcher activeAsset={activeAsset} setActiveAsset={setActiveAsset} />
          {activeAsset === 'ETH' && (
            <span style={{ fontSize:11, color:'rgba(98,126,234,0.5)', fontStyle:'italic' }}>
              Strategies in development · config: active=false
            </span>
          )}
          {activeAsset === 'BTC' && (
            <span style={{ fontSize:11, color:'#2a2a38' }}>
              {`v9 · ${data?.date_range?.start?.slice(0,7) || ''}→${data?.date_range?.end?.slice(0,7) || ''}`}
            </span>
          )}
        </div>

        {/* ETH empty state — replaces all page content */}
        {activeAsset === 'ETH' ? (
          <EthEmptyState />
        ) : (
          <>
        {/* Mode banners */}
        {viewMode === 'paper' && (
          <div style={{
            background:'rgba(247,147,26,0.12)', borderBottom:'1px solid rgba(247,147,26,0.3)',
            padding:'6px 20px', display:'flex', alignItems:'center', gap:10, flexShrink:0,
            fontFamily:"'Space Grotesk',sans-serif", fontSize:12, color:'#F7931A', fontWeight:600,
          }}>
            <span style={{fontSize:14}}>⚠</span>
            PAPER TRADING — no real money
            <span style={{marginLeft:'auto', fontSize:11, color:'rgba(247,147,26,0.55)', fontWeight:400}}>
              DRY trades only · $1,000 simulated account
            </span>
          </div>
        )}
        {viewMode === 'backtest' && (
          <div style={{
            background:'rgba(56,189,248,0.08)', borderBottom:'1px solid rgba(56,189,248,0.25)',
            padding:'6px 20px', display:'flex', alignItems:'center', gap:10, flexShrink:0,
            fontFamily:"'Space Grotesk',sans-serif", fontSize:12, color:'#38bdf8', fontWeight:600,
          }}>
            <span style={{fontSize:14}}>📊</span>
            BACKTEST MODE — historical data only
            <span style={{marginLeft:'auto', fontSize:11, color:'rgba(56,189,248,0.55)', fontWeight:400}}>
              {simData?.date_range ? `${simData.date_range.start?.slice(0,7)} → ${simData.date_range.end?.slice(0,7)}` : 'Loading…'}
            </span>
          </div>
        )}

        <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
          {PAGE_DEFS.map(({ id, el }) => (
            <div key={id} data-page={id} style={{
              position:'absolute', inset:0, overflowY:'auto',
              display: page === id ? 'block' : 'none',
            }}>
              {el}
            </div>
          ))}
        </div>
          </>
        )}
      </div>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={tweaksPanelStyle}>
          <div style={tpStyles.header}>
            <span style={tpStyles.title}>Tweaks</span>
            <button onClick={() => { setTweaksOpen(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }} style={tpStyles.close}>✕</button>
          </div>
          <div style={tpStyles.section}>
            <div style={tpStyles.label}>Accent Color</div>
            <div style={tpStyles.colorRow}>
              {['#F7931A','#00d084','#a78bfa','#38bdf8','#fb7185'].map(c => (
                <div key={c} onClick={() => setTweak('accentColor', c)}
                  style={{...tpStyles.swatch, background:c, outline: tweaks.accentColor===c ? `2px solid ${c}` : '2px solid transparent', outlineOffset:2}} />
              ))}
            </div>
          </div>
          <div style={tpStyles.section}>
            <div style={tpStyles.label}>Background</div>
            <div style={tpStyles.colorRow}>
              {['#0a0a0c','#090910','#0c0a0a','#08080e'].map(c => (
                <div key={c} onClick={() => setTweak('bgColor', c)}
                  style={{...tpStyles.swatch, background:c, border:'1px solid #2a2a38', outline: tweaks.bgColor===c ? '2px solid #F7931A' : '2px solid transparent', outlineOffset:2}} />
              ))}
            </div>
          </div>
          <div style={tpStyles.section}>
            <div style={tpStyles.label}>Surface</div>
            <div style={tpStyles.colorRow}>
              {['#111116','#13131a','#0f0f14','#141420'].map(c => (
                <div key={c} onClick={() => setTweak('surfaceColor', c)}
                  style={{...tpStyles.swatch, background:c, border:'1px solid #2a2a38', outline: tweaks.surfaceColor===c ? '2px solid #F7931A' : '2px solid transparent', outlineOffset:2}} />
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const tweaksPanelStyle = {
  position:'fixed', bottom:24, right:24, width:240, background:'#17171e', border:'1px solid #2a2a38',
  borderRadius:12, padding:'16px', zIndex:1000, boxShadow:'0 8px 32px rgba(0,0,0,0.6)',
  fontFamily:"'Space Grotesk',sans-serif",
};
const tpStyles = {
  header: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 },
  title: { fontSize:13, fontWeight:700, color:'#ece9e2' },
  close: { background:'transparent', border:'none', color:'#5a5a6e', cursor:'pointer', fontSize:14, padding:4 },
  section: { marginBottom:14 },
  label: { fontSize:11, color:'#3e3e52', letterSpacing:'0.5px', marginBottom:8, textTransform:'uppercase' },
  colorRow: { display:'flex', gap:8 },
  swatch: { width:28, height:28, borderRadius:6, cursor:'pointer', transition:'transform 0.1s' },
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
